service: timetable-class

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4006
    lambdaPort: 4056
    noPrependStageInUrl: true

functions:
  class:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /api/classes
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/classes
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/classes/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/classes/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/classes/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/classes/{id}/divisions
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/classes/{classId}/divisions/{divisionId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/classes/{classId}/divisions/{divisionId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/classes/{classId}/divisions/{divisionId}/class-teacher-analyze
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/classes/{classId}/divisions/{divisionId}/class-teacher-swap
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/classes/{classId}/divisions/{divisionId}/class-teacher
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/classes/{classId}/divisions/{divisionId}/class-teacher
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/classes/bulk-class-teacher
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/classes/health
