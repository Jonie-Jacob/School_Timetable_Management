service: timetable-export

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 512
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
    EXPORT_BUCKET: ${env:EXPORT_BUCKET, ''}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4010
    lambdaPort: 4060
    noPrependStageInUrl: true

functions:
  export:
    handler: src/handler.handler
    timeout: 60
    events:
      - httpApi:
          method: POST
          path: /export/division/pdf
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/division/excel
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/class/pdf
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/class/excel
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/teacher/pdf
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/teacher/excel
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/teachers/pdf
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /export/teachers/excel
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /export/health
