service: timetable-service

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
    ECS_CLUSTER_ARN: ${env:ECS_CLUSTER_ARN, ''}
    ECS_TASK_DEF_ARN: ${env:ECS_TASK_DEF_ARN, ''}
    ECS_SUBNET_IDS: ${env:ECS_SUBNET_IDS, ''}
    ECS_SECURITY_GROUP_ID: ${env:ECS_SECURITY_GROUP_ID, ''}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4008
    lambdaPort: 4058
    noPrependStageInUrl: true

functions:
  timetable:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /api/timetables/generate
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/generate/active
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/generate/status/{jobId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/divisions/{divisionId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/timetables/slots/{slotId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/slots/{slotId}/valid-swaps
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/swap
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/swap-elective
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/swap-teacher
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/preview-teacher-swap
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/preview-elective-swap
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/slots/{slotId}/valid-elective-swaps
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/slots/{slotId}/resolution-candidates
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/auto-resolve
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/slots/create-empty
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/timetables/{id}/publish
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/{id}/conflicts
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/teacher/{teacherId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/timetables/health
