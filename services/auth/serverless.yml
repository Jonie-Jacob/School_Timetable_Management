service: timetable-auth

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
    JWT_SECRET: ${env:JWT_SECRET, 'local-dev-secret-key-change-in-prod'}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, ''}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}

custom:
  serverless-offline:
    httpPort: 4001
    lambdaPort: 4051
    noPrependStageInUrl: true

functions:
  auth:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /api/auth/register
      - httpApi:
          method: POST
          path: /api/auth/login
      - httpApi:
          method: GET
          path: /api/auth/me
      - httpApi:
          method: GET
          path: /api/auth/health
