service: timetable-school-config

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4003
    lambdaPort: 4053
    noPrependStageInUrl: true

functions:
  schoolConfig:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /api/config/period-structures
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/config/period-structures
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/config/period-structures/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/config/period-structures/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/config/period-structures/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/config/period-structures/{id}/assign
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/config/period-structures/{id}/working-days
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/config/period-structures/{id}/working-days
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/config/period-structures/{id}/slots/generate
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/config/period-structures/{id}/slots
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/config/period-structures/{id}/days/{dayId}/slots
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/config/period-structures/{id}/days/{dayId}/slots/{slotId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/config/period-structures/{id}/days/{dayId}/slots/{slotId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/config/period-structures/{id}/days/{dayId}/slots/reorder
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/config/period-structures/{id}/days/{dayId}/copy-from/{sourceDayId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/config/period-structures/{id}/reset
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/config/health
