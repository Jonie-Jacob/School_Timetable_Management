service: timetable-division-assignment

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4007
    lambdaPort: 4057
    noPrependStageInUrl: true

functions:
  assignment:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: GET
          path: /api/divisions/{divisionId}/assignments
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/divisions/{divisionId}/assignments
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/divisions/{divisionId}/assignments/elective
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/assignments/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/assignments/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/elective-groups/grouped
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/elective-groups/bulk-save
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/elective-groups
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/elective-groups
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/elective-groups/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/elective-groups/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/elective-groups/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/elective-groups/{id}/subjects
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /api/elective-groups/{groupId}/subjects/{subjectId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /api/elective-groups/{groupId}/subjects/{subjectId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/assignments/unassigned
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/assignments/quick-assign
          authorizer:
            name: cognitoAuthorizer
      # Enhancement 4: Timetable-Aware Assignment Editing
      - httpApi:
          method: POST
          path: /api/assignments/impact
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/assignments/resolve-pw-balance
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/assignments/resolve-slot-removal
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: POST
          path: /api/assignments/resolve-slot-fill
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/assignments/division-pw-summary/{divisionId}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /api/assignments/health
