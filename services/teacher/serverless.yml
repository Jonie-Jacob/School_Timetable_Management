service: timetable-teacher

plugins:
  - serverless-offline
  - ../../plugins/serverless-prod-config

provider:
  name: aws
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ap-south-1
  memorySize: 256
  environment:
    DATABASE_URL: ${env:DATABASE_URL, 'postgresql://timetable_admin:localdev123@localhost:5433/timetable_dev'}
    STAGE: ${self:provider.stage}
  httpApi:
    authorizers:
      cognitoAuthorizer:
        type: jwt
        identitySource: $request.header.Authorization
        issuerUrl: ${env:COGNITO_ISSUER_URL, 'https://cognito-idp.ap-south-1.amazonaws.com/local'}
        audience:
          - ${env:COGNITO_CLIENT_ID, 'local'}

custom:
  serverless-offline:
    httpPort: 4005
    lambdaPort: 4055
    noPrependStageInUrl: true

functions:
  teacher:
    handler: src/handler.handler
    timeout: 30
    events:
      - httpApi:
          method: POST
          path: /teachers
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /teachers
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /teachers/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /teachers/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: DELETE
          path: /teachers/{id}
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /teachers/{id}/subjects
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: PUT
          path: /teachers/{id}/availability
          authorizer:
            name: cognitoAuthorizer
      - httpApi:
          method: GET
          path: /teachers/health
