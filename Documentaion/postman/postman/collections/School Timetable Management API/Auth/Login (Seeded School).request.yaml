$kind: http-request
url: "{{authBaseUrl}}/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "admin@sacredheart.edu",
      "password": "password123"
    }
auth:
  type: noauth
scripts:
  - type: afterResponse
    code: >-
      if (pm.response.code === 200) {
        const data = pm.response.json().data;
        pm.environment.set('token', data.token);
        pm.environment.set('schoolId', data.school.id);
        pm.test('Seeded school login successful', () => pm.response.to.have.status(200));
      }
    language: text/javascript
order: 3000
