$kind: http-request
url: "{{baseUrl}}/divisions/{{divisionId}}/assignments"
method: POST
headers:
  Content-Type: application/json
  X-Academic-Year-Id: "{{academicYearId}}"
body:
  type: text
  content: |-
    {
      "subjectId": "{{subjectId}}",
      "teacherId": "{{teacherId}}",
      "periodsPerWeek": 5
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.code === 201) {
        const data = pm.response.json().data;
        pm.environment.set('assignmentId', data.id);
        pm.test('Assignment created', () => pm.response.to.have.status(201));
      }
    language: text/javascript
order: 2000
