$kind: http-request
url: "{{baseUrl}}/elective-groups"
method: POST
headers:
  Content-Type: application/json
  X-Academic-Year-Id: "{{academicYearId}}"
body:
  type: text
  content: |-
    {
      "name": "Science Electives - Class XI"
    }
scripts:
  - type: afterResponse
    code: >-
      if (pm.response.code === 201) {
        const data = pm.response.json().data;
        pm.environment.set('electiveGroupId', data.id);
        pm.test('Elective group created', () => pm.response.to.have.status(201));
      }
    language: text/javascript
order: 1000
